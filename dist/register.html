<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Aurora - Sign Up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom sticky-top">
      <div class="container-fluid px-lg-4">
        <a class="navbar-brand fw-bold fs-4" href="index.html">GRAND AURORA</a>
        <div class="d-flex align-items-center gap-2 order-lg-3">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="d-flex gap-2" id="navAuth"></div>
        </div>

        <div
          class="collapse navbar-collapse justify-content-center order-lg-2"
          id="navbarNav"
        >
          <ul
            class="navbar-nav fw-semibold gap-1 gap-lg-3 my-3 my-lg-0 text-center"
          >
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="booking.html">Book Now</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage.html">Manage Booking</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-5">
            <div class="card card-custom shadow p-4 border-0">
              <div class="text-center mb-2">
                <h3 class="fw-bold text-dark">Buat Akun Baru</h3>
                <p class="text-muted small">
                  Daftar untuk menikmati kemudahan reservasi
                </p>
              </div>
              <form id="registerform">
                <div class="mb-3">
                  <label for="regnama" class="form-label small fw-semibold"
                    >Nama</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="regnama"
                    placeholder="Masukkan nama sesuai KTP"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="regemail" class="form-label small fw-semibold"
                    >Email</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="regemail"
                    placeholder="nama@email.com"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="regpassword" class="form-label small fw-semibold"
                    >Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="regpassword"
                    placeholder="*****"
                    required
                  />
                </div>
                <button
                  type="submit"
                  id="tomreg"
                  class="btn btn-custom w-100 fw-semibold mb-3"
                >
                  SIGN UP
                </button>
                <div class="text-center">
                  <span class="small text-muted">
                    Sudah punya akun?
                    <a
                      href="login.html"
                      class="fw-semibold"
                      style="color: #a3704c"
                      >Login</a
                    >
                  </span>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4">
      <div class="container text-center">
        <p class="mb-1 fw-bold">Grand Aurora Hotel System &copy; 2026</p>
        <p class="small mb-0">
          Dikembangkan oleh Imam jamaluddin alkhaq (250411100009)
        </p>
      </div>
    </footer>
  </body>
  <script src="js/register.js"></script>
  <script src="js/autentifikasi.js"></script>
</html>
