    ></script>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom sticky-top">

        <a class="navbar-brand fw-bold fs-4" href="index.html">GRAND AURORA</a>

          <button

            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="d-flex gap-2">
            <a
              href="login.html"
              class="btn btn-outline-light btn-sm fw-semibold px-3"
              >Login</a
            >
            <a
              href="register.html"
              class="btn btn-light btn-sm text-dark fw-semibold px-3 d-none d-sm-block"
              >Register</a
            >
          </div>
        </div>

        <div
          class="collapse navbar-collapse justify-content-center order-lg-2"
          id="navbarNav"
        >
          <ul

              <a class="nav-link" href="index.html">Home</a>

              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="booking.html">Book Now</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage.html">Manage Booking</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card card-custom p-4">
              <h3 class="fw-bold mb-4 text-center">Form Reservasi</h3>
              <form id="bookingform">
                <div class="row g-3">
                  <div class="col-12">
                    <label for="nama" class="form-label fw-semibold"
                      >Nama Tamu</label
                    >
                    <input
                      type="text"
                      id="nama"
                      class="form-control"
                      placeholder="Masukkan nama sesuai KTP"
                      required
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="email" class="form-label fw-semibold"
                      >Email</label
                    >
                    <input
                      type="email"
                      id="email"
                      class="form-control"
                      placeholder="nama@email.com"
                      required
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="telepon" class="form-label fw-semibold"
                      >Nomor Telepon</label
                    >
                    <input
                      type="tel"
                      id="telepon"
                      class="form-control"
                      placeholder="Contoh: 081234..."
                      required
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="checkin" class="form-label fw-semibold"
                      >Tanggal Check-In</label
                    >
                    <input
                      type="date"
                      id="checkin"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="checkout" class="form-label fw-semibold"
                      >Tanggal Check-Out</label
                    >
                    <input
                      type="date"
                      id="checkout"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="kamar" class="form-label fw-semibold"
                      >Kelas Kamar</label
                    >
                    <select id="kamar" class="form-select" required>
                      <option value="">-- Pilih Kelas Kamar --</option>
                      <option value="350000">
                        Standard Class (Rp 350.000)
                      </option>
                      <option value="500000">
                        Superior Class (Rp 500.000)
                      </option>
                      <option value="850000">Deluxe Class (Rp 850.000)</option>
                      <option value="1200000">
                        President Class (Rp 1.200.000)
                      </option>
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label for="tamu" class="form-label fw-semibold"
                      >Jumlah Tamu</label
                    >
                    <input
                      type="number"
                      id="tamu"
                      class="form-control"
                      min="1"
                      max="4"
                      value="1"
                    />
                  </div>

                  <div class="col-12">
                    <label for="kamarsaja" class="form-label fw-semibold"
                      >Layanan Tambahan (+Rp 50.000 / Malam)</label
                    >
                    <div id="tambahan">
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="sarapan"
                          id="sarapan"
                          value="50000"
                        />
                        <label class="form-check-label" for="sarapan"
                          >Termasuk Sarapan</label
                        >
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="sarapan"
                          id="kamarsaja"
                          value="0"
                          checked
                        />
                        <label class="form-check-label" for="kamarsaja"
                          >Kamar Saja</label
                        >
                      </div>
                    </div>
                  </div>

                  <div class="col-12">
                    <label for="catatan" class="form-label fw-semibold"
                      >Catatan Khusus (Opsional)</label
                    >
                    <textarea
                      class="form-control"
                      id="catatan"
                      rows="3"
                      placeholder="Permintaan tambahan kasur, jam kedatangan, dll."
                    ></textarea>
                  </div>

                  <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-custom w-100">
                      Pesan Kamar
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <div class="col-lg-4">
            <div
              class="card card-custom p-4 position-sticky bg-light"
              style="top: 100px"
            >
              <h5 class="fw-bold mb-3 border-bottom pb-2">Ringkasan Biaya</h5>
              <div class="d-flex justify-content-between mb-2">
                <span>Kamar :</span>
                <span id="textkamar" class="fw-semibold">-</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span>Total Durasi :</span>
                <span id="textdurasi" class="fw-semibold">0 Malam</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span>Layanan Tambahan :</span>
                <span id="textlayanan" class="fw-semibold">-</span>
              </div>
              <hr />
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold">Total Harga :</span>
                <span id="texttotal" class="fw-bold text-success fs-5"
                  >Rp 0</span
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4">
      <div class="container text-center">
        <p class="mb-1 fw-bold">Grand Aurora Hotel System &copy; 2026</p>
        <p class="small mb-0">
          Dikembangkan oleh Imam jamaluddin alkhaq (250411100009)
        </p>
      </div>
    </footer>
  </body>
</html>
